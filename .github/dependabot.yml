version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/python"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10

  - package-ecosystem: "bundler"
    directory: "/ruby"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10

  - package-ecosystem: "npm"
    directory: "/javascript"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
