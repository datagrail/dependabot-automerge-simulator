name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - run: pip install -r python/requirements.txt pytest
      - run: pytest
        working-directory: python

  test-ruby:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ruby/setup-ruby@3ff19f5e2baf30647122352b96108b1fbe250c64 # v1.299.0
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: ruby
      - run: bundle exec ruby test_hello.rb
        working-directory: ruby

  test-javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
      - run: npm ci
        working-directory: javascript
      - run: npm test
        working-directory: javascript

  # Single required check configured in branch protection.
  # All three language jobs must pass for this to succeed.
  tests-passed:
    runs-on: ubuntu-latest
    needs: [test-python, test-ruby, test-javascript]
    steps:
      - run: echo "All tests passed"
