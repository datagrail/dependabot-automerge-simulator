name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r python/requirements.txt pytest
      - run: pytest
        working-directory: python

  test-ruby:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: ruby
      - run: bundle exec ruby test_hello.rb
        working-directory: ruby

  test-javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
        working-directory: javascript
      - run: npm test
        working-directory: javascript

  # Single required check configured in branch protection.
  # All three language jobs must pass for this to succeed.
  tests-passed:
    runs-on: ubuntu-latest
    needs: [test-python, test-ruby, test-javascript]
    steps:
      - run: echo "All tests passed"
