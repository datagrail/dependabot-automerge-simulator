name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - run: pip install -r python/requirements.txt pytest
      - run: pytest
        working-directory: python

  test-ruby:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ruby/setup-ruby@3ff19f5e2baf30647122352b96108b1fbe250c64 # v1.299.0
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: ruby
      - run: bundle exec ruby test_hello.rb
        working-directory: ruby

  test-javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
      - run: npm ci
        working-directory: javascript
      - run: npm test
        working-directory: javascript

  # Single required check configured in branch protection.
  # All three language jobs must pass for this to succeed.
  tests-passed:
    runs-on: ubuntu-latest
    needs: [test-python, test-ruby, test-javascript]
    steps:
      - run: echo "All tests passed"
