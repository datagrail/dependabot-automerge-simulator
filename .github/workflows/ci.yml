name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - run: pip install -r python/requirements.txt pytest
      - run: pytest
        working-directory: python

  test-ruby:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ruby/setup-ruby@3ff19f5e2baf30647122352b96108b1fbe250c64 # v1.299.0
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: ruby
      - run: bundle exec ruby test_hello.rb
        working-directory: ruby

  test-javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
      - run: npm ci
        working-directory: javascript
      - run: npm test
        working-directory: javascript

  # Single required check configured in branch protection.
  # All three language jobs must pass for this to succeed.
  tests-passed:
    runs-on: ubuntu-latest
    needs: [test-python, test-ruby, test-javascript]
    steps:
      - run: echo "All tests passed"
